name: Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Validate repository structure
        run: python tools/validate_kestra.py

      - name: Run Bitrix24 unit tests
        run: python -m unittest discover -s automations/bitrix24/files/bitrix24_form_flow/tests -p "test_*.py"
        env:
          PYTHONPATH: automations/bitrix24/files

      - name: Dry-run Bitrix24 deploy
        run: python tools/deploy_kestra.py --environment dev --domain bitrix24 --dry-run
