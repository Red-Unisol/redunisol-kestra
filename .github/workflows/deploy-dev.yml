name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to deploy to dev
        required: false
        type: choice
        options:
          - all
          - bitrix24
          - reporting
          - legacy

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bitrix24: ${{ steps.filter.outputs.bitrix24 }}
      reporting: ${{ steps.filter.outputs.reporting }}
      legacy: ${{ steps.filter.outputs.legacy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed domains
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bitrix24:
              - 'automations/bitrix24/**'
            reporting:
              - 'automations/reporting/**'
            legacy:
              - 'automations/legacy/**'

  deploy-dev-bitrix24:
    runs-on: ubuntu-latest
    environment: kestra-dev
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.domain == 'all' || inputs.domain == 'bitrix24')) ||
      (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.bitrix24 == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Deploy Bitrix24 to dev
        run: |
          python tools/deploy_kestra.py --environment dev --domain bitrix24
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_USERNAME: ${{ secrets.KESTRA_USERNAME }}
          KESTRA_PASSWORD: ${{ secrets.KESTRA_PASSWORD }}
          KESTRA_TENANT: ${{ secrets.KESTRA_TENANT }}

  deploy-dev-reporting:
    runs-on: ubuntu-latest
    environment: kestra-dev
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.domain == 'all' || inputs.domain == 'reporting')) ||
      (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.reporting == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Deploy Reporting to dev
        run: |
          python tools/deploy_kestra.py --environment dev --domain reporting
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_USERNAME: ${{ secrets.KESTRA_USERNAME }}
          KESTRA_PASSWORD: ${{ secrets.KESTRA_PASSWORD }}
          KESTRA_TENANT: ${{ secrets.KESTRA_TENANT }}

  deploy-dev-legacy:
    runs-on: ubuntu-latest
    environment: kestra-dev
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.domain == 'all' || inputs.domain == 'legacy')) ||
      (github.event_name != 'workflow_dispatch' && needs.detect-changes.outputs.legacy == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Deploy Legacy to dev
        run: |
          python tools/deploy_kestra.py --environment dev --domain legacy
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_USERNAME: ${{ secrets.KESTRA_USERNAME }}
          KESTRA_PASSWORD: ${{ secrets.KESTRA_PASSWORD }}
          KESTRA_TENANT: ${{ secrets.KESTRA_TENANT }}
