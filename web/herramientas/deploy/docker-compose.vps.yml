services:
  herramientas:
    image: ${APP_IMAGE}
    pull_policy: always
    depends_on:
      - credixsa-cache-api
    ports:
      - "${APP_BIND}"
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      ANALISIS_CREDITO_RENOVACION_WEBHOOK_URL: ${ANALISIS_CREDITO_RENOVACION_WEBHOOK_URL}
      ANALISIS_CREDITO_CONSULTA_CAJA: ${ANALISIS_CREDITO_CONSULTA_CAJA}
      ANALISIS_CREDITO_QUIEBRA_CREDIX_CACHE_URL: http://credixsa-cache-api:8000/credixsa/cache
      ANALISIS_CREDITO_QUIEBRA_CREDIX_WEBHOOK_URL: ${ANALISIS_CREDITO_QUIEBRA_CREDIX_WEBHOOK_URL}
      ANALISIS_CREDITO_CONSULTA_EMPLEADOR_WEBHOOK_URL: ${ANALISIS_CREDITO_CONSULTA_EMPLEADOR_WEBHOOK_URL}
      ANALISIS_CREDITO_CONSULTA_CUAD_WEBHOOK_URL: ${ANALISIS_CREDITO_CONSULTA_CUAD_WEBHOOK_URL}
      ANALISIS_CREDITO_TIMEOUT_SECONDS: ${ANALISIS_CREDITO_TIMEOUT_SECONDS}
      ANALISIS_CREDITO_CACHE_TIMEOUT_SECONDS: 3
      CONTABILIDAD_TRANSFER_PRIVATE_SLUG: ${CONTABILIDAD_TRANSFER_PRIVATE_SLUG}
      CONTABILIDAD_TRANSFER_OUTPUT_ROOT: /data/contabilidad-transfer
      OBJECTIVES_DASHBOARD_PRIVATE_SLUG: ${OBJECTIVES_DASHBOARD_PRIVATE_SLUG:-oficina}
      OBJECTIVES_DASHBOARD_SNAPSHOT_PATH: /data/reporte-evaluacion/dashboard/latest.json
      OBJECTIVES_DASHBOARD_REFRESH_SECONDS: ${OBJECTIVES_DASHBOARD_REFRESH_SECONDS:-60}
      LOG_CHANNEL: ${LOG_CHANNEL}
    volumes:
      - /opt/kestra/data/contabilidad-transfer:/data/contabilidad-transfer:ro
      - /opt/kestra/data/reporte-evaluacion:/data/reporte-evaluacion:ro
    restart: unless-stopped

  credixsa-cache-api:
    image: ${CREDIXSA_CACHE_API_IMAGE}
    pull_policy: always
    environment:
      CREDIXSA_CACHE_DB_PATH: /data/credixsa-cache/credixsa.sqlite
      CREDIXSA_CACHE_MAX_AGE_DAYS: 7
    volumes:
      - /opt/kestra/data/credixsa-cache:/data/credixsa-cache
    restart: unless-stopped
