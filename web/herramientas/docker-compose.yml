services:
  herramientas:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3010:80"
    environment:
      APP_NAME: ${APP_NAME:-Herramientas Red Unisol}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://127.0.0.1:3010}
      APP_KEY: ${APP_KEY}
      ANALISIS_CREDITO_WEBHOOK_URL: ${ANALISIS_CREDITO_WEBHOOK_URL}
      ANALISIS_CREDITO_TIMEOUT_SECONDS: ${ANALISIS_CREDITO_TIMEOUT_SECONDS:-30}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
    restart: unless-stopped